name: Release

# Tag-driven binary release. The default build is engine-free with no native
# dependencies (the Oracle driver is an opt-in feature), so the `oraclemcp`
# binary cross-compiles cleanly to every target below. `workflow_dispatch`
# runs the build matrix on demand to validate it without cutting a release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linkers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: cargo build --release -p oraclemcp --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dist="oraclemcp-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/oraclemcp" "$dist/"
          cp README.md LICENSE-APACHE LICENSE-MIT "$dist/"
          tar czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dist="oraclemcp-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/oraclemcp.exe" "$dist/"
          cp README.md LICENSE-APACHE LICENSE-MIT "$dist/"
          7z a "$dist.zip" "$dist" >/dev/null
          certutil -hashfile "$dist.zip" SHA256 > "$dist.zip.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oraclemcp-${{ matrix.target }}
          path: |
            oraclemcp-${{ matrix.target }}.tar.gz*
            oraclemcp-${{ matrix.target }}.zip*
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish release with checksums
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
          generate_release_notes: true
