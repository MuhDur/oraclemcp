name: Release

# Tag-driven full release. A pushed vX.Y.Z tag is the source of truth: it must
# match Cargo/package metadata, runs the release gates, publishes crates.io in
# dependency order, builds GitHub assets, pushes the GHCR image, then publishes
# server.json to the MCP registry. `workflow_dispatch` validates the gates/build
# without publishing anything.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    name: release gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Validate release metadata
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          RELEASE_REQUIRE_MAIN: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: bash scripts/release_preflight.sh

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc
      - run: cargo doc --workspace --no-deps
      - run: bash scripts/oraclemcp_boundary_lint.sh
      - run: bash scripts/sensitive_data_lint.sh
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check
      - run: cargo build -p oraclemcp --features live-db
      - run: cargo package --workspace --locked

  msrv:
    name: build on MSRV (1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  build:
    name: build ${{ matrix.target }}
    needs: [checks, msrv]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linkers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: cargo build --release -p oraclemcp --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dist="oraclemcp-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/oraclemcp" "$dist/"
          cp README.md LICENSE-APACHE LICENSE-MIT "$dist/"
          tar czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dist="oraclemcp-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/oraclemcp.exe" "$dist/"
          cp README.md LICENSE-APACHE LICENSE-MIT "$dist/"
          7z a "$dist.zip" "$dist" >/dev/null
          certutil -hashfile "$dist.zip" SHA256 > "$dist.zip.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oraclemcp-${{ matrix.target }}
          path: |
            oraclemcp-${{ matrix.target }}.tar.gz*
            oraclemcp-${{ matrix.target }}.zip*
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: [build, publish-crates]
    if: >-
      ${{
        always() &&
        startsWith(github.ref, 'refs/tags/') &&
        needs.build.result == 'success' &&
        (contains(github.ref_name, '-') || needs.publish-crates.result == 'success')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Publish release with checksums
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Publish the workspace to crates.io on a non-pre-release version tag before
  # the GitHub release exists. The script is idempotent for release retries and
  # skips exact versions that are already on crates.io.
  publish-crates:
    name: Publish to crates.io
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: crates-io
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish_crates.sh

  docker:
    name: publish GHCR image
    needs: release
    if: >-
      ${{
        always() &&
        startsWith(github.ref, 'refs/tags/') &&
        needs.release.result == 'success'
      }}
    runs-on: ubuntu-latest
    environment: ghcr
    permissions:
      contents: read
      packages: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Resolve Docker tags
        id: tags
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/muhdur/oraclemcp:${version}"
            if [[ "$version" != *-* ]]; then
              echo "ghcr.io/muhdur/oraclemcp:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
      - name: Verify pushed image
        run: docker buildx imagetools inspect "ghcr.io/muhdur/oraclemcp:${GITHUB_REF_NAME#v}"

  publish-mcp-registry:
    name: publish MCP registry entry
    needs: docker
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: mcp-registry
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Authenticate to the MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish
