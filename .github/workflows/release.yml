name: Release

# Tag-driven full release. A pushed vX.Y.Z tag is the source of truth: it must
# match Cargo/package metadata, runs the release gates, publishes crates.io in
# dependency order, builds GitHub assets, pushes the GHCR image, then publishes
# server.json to the MCP registry.
#
# `workflow_dispatch` (run against a candidate branch/SHA from the Actions UI
# or `gh workflow run release.yml --ref <branch>`) is the PRE-TAG RELEASE
# REHEARSAL (plan §29.3): every publish-gating job below (`checks`,
# `pinned-nightly`, `release-acceptance`, and the full 7-target `build` matrix
# incl. the binary-size check) runs exactly as it would on the real tag — the
# only difference is that every job past `build` (`release`, `publish-crates`,
# `docker`, `publish-mcp-registry`, `verify-mcp-registry`) is gated on
# `startsWith(github.ref, 'refs/tags/')` and is skipped, so nothing publishes.
# Rehearsing a candidate SHA this way, once, replaces the 0.9.0-style loop of
# discovering one release-mechanics gate per re-tag (binary-size budget,
# packaged-tarball self-containment, release-gates timeout — see §29.3's
# postmortem) with a single dry run before the tag is ever pushed.
# ROLLBACK_COVERAGE: crates.io=publish-crates github-release=release signed-artifacts=release ghcr=docker mcp-registry=publish-mcp-registry
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly-2026-05-11
  NODE_VERSION: 22.17.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web-build:
    name: web bundle (npm ci + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run check
        working-directory: web
      - run: bash scripts/dashboard_bundle_check.sh
      - uses: actions/upload-artifact@v7
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
          if-no-files-found: error

  checks:
    name: release gates
    needs: web-build
    runs-on: ubuntu-latest
    # 60 (was 45): the full gate battery (fmt + clippy x3 + test --workspace
    # --all-targets + dashboard test + doc + deny x2 + package) sits right at the
    # 45m edge on a cold-ish cache; a workspace-crate source change (e.g. the
    # binary) forces a recompile that tips it over. 60 gives headroom.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Validate release metadata
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          RELEASE_REQUIRE_MAIN: ${{ startsWith(github.ref, 'refs/tags/') }}
          # Operator ruling 2026-07-21 (plan v8 §Z2): the mutation seal is
          # advisory for this train — a day-scale campaign must never stall a
          # release. Loud E_STALE_SEAL warning instead of a hard fail; seal
          # evidence accrues from the scheduled shard rotation.
          ALLOW_STALE_MUTATION_SEAL: "1"
        run: bash scripts/release_preflight.sh

      - name: Validate workflow dependency policy
        run: bash scripts/workflow_supply_chain_check.sh

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p oraclemcp-core --all-targets --features dashboard-bundle -- -D warnings
      - run: cargo clippy -p oraclemcp --all-targets --features dashboard-bundle -- -D warnings
      - name: cargo test --workspace --all-targets
        run: |
          set -euo pipefail
          mkdir -p target/ci-logs
          cargo test --workspace --all-targets 2>&1 | tee target/ci-logs/cargo-test.log
      - run: bash scripts/oraclemcp_concurrency_lint.sh --test-output target/ci-logs/cargo-test.log
      - run: cargo test -p oraclemcp-core --features dashboard-bundle dashboard
      - run: cargo test --workspace --doc
      - run: cargo doc --workspace --no-deps
      - run: bash scripts/oraclemcp_boundary_lint.sh
      - run: bash scripts/oraclemcp_agent_surface_lint.sh
      - run: bash scripts/oraclemcp_concurrency_lint.sh
      - run: bash scripts/secret_scan.sh
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny
      - run: cargo deny check
      - run: cargo deny --features oraclemcp/dashboard-bundle,oraclemcp-core/dashboard-bundle check
      - run: cargo build -p oraclemcp --features dashboard-bundle
      # Cargo verifies a packaged workspace crate by resolving its rewritten
      # path dependencies from crates.io. For a fresh tag, sibling crates are
      # not all on crates.io yet, so package assembly is checked here and
      # per-crate packaged verification runs in dependency order immediately
      # before each publish in scripts/publish_crates.sh.
      - run: cargo package --workspace --locked --no-verify
      # `--no-verify` above means the tarball is never actually COMPILED here,
      # so it cannot catch a file an embedding macro needs but packaging left
      # out (0.9.0 attempt #2 — cfc650b — was exactly this: install.sh/
      # install.ps1 embedded from outside crates/oraclemcp/, so the tarball
      # assembled fine and only failed to COMPILE, minutes into the real
      # `cargo publish --dry-run`). This check proves the same property
      # without needing sibling crates to already be published: every
      # `include_bytes!`/`include_str!` literal path in each crate's non-test
      # source must resolve to a file `cargo package --list` actually
      # includes.
      - run: bash scripts/release_tarball_contents_check.sh
      - run: bash scripts/dashboard_bundle_check.sh --check-crates

  pinned-nightly:
    name: build on pinned nightly
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --workspace
      - run: cargo build -p oraclemcp --features dashboard-bundle

  release-acceptance:
    name: release acceptance suite (B.12)
    needs: [checks, web-build]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      # The B.12 suite builds the full oraclemcp binary + its --all-targets test
      # binaries into one target/ dir, which exceeded the ubuntu-latest ~14GB disk
      # once the K10 streaming surface landed — `ld` died with SIGBUS (bus error,
      # core dumped) faulting on its output mmap when the disk filled. Free the
      # ~25GB of preinstalled toolchains we don't use before the heavy build/link.
      - name: Free disk space for the release-acceptance build
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/lib/android /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-hack
      - run: bash scripts/release_acceptance_ci_suite.sh

  build:
    name: build ${{ matrix.target }}
    # release-acceptance is intentionally NOT a dependency here: it consumes
    # nothing this job produces and produces nothing this job consumes (both
    # only need `checks` + `web-build`), so serializing them wastes ~14 min of
    # wall-clock on every release/rehearsal run (plan §25.3 P1.1). Publishing
    # stays fully gated: publish-crates.needs includes release-acceptance, so
    # nothing ships before that suite is green.
    needs: [checks, pinned-nightly, web-build]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # binary_warn_bytes is a ratchet, not a second hard cap (plan §27.2 C10 /
      # §29.3): crossing it prints a visible ::warning:: annotation but never
      # fails the job, so growth toward binary_limit_bytes becomes visible run
      # after run instead of arriving as a silent-until-it-isn't cliff (the
      # 0.9.0 attempt #1 failure — 62dff28 — was exactly a stale hard limit
      # discovered only by an outright tag-pipeline failure).
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_tool: cargo
            binary_warn_bytes: 43000000
            binary_limit_bytes: 48000000
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build_tool: cargo
            binary_warn_bytes: 43000000
            binary_limit_bytes: 48000000
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build_tool: cargo
            binary_warn_bytes: 43000000
            binary_limit_bytes: 48000000
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            build_tool: cargo-zigbuild
            binary_warn_bytes: 43000000
            binary_limit_bytes: 48000000
          - os: macos-latest
            target: x86_64-apple-darwin
            build_tool: cargo
            binary_warn_bytes: 43000000
            binary_limit_bytes: 48000000
          - os: macos-latest
            target: aarch64-apple-darwin
            build_tool: cargo
            binary_warn_bytes: 43000000
            binary_limit_bytes: 48000000
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build_tool: cargo
            binary_warn_bytes: 36000000
            binary_limit_bytes: 40000000
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install Zig (aarch64 musl)
        if: matrix.build_tool == 'cargo-zigbuild'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild (aarch64 musl)
        if: matrix.build_tool == 'cargo-zigbuild'
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-zigbuild

      - name: Install cross linkers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils file
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          fi

      - name: Apply non-Linux single-tenant build waiver
        if: runner.os != 'Linux'
        shell: bash
        run: echo 'RUSTC_WRAPPER=' >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.build_tool }}" = "cargo-zigbuild" ]; then
            cargo zigbuild --release -p oraclemcp --features dashboard-bundle --target "${{ matrix.target }}"
          else
            cargo build --release -p oraclemcp --features dashboard-bundle --target "${{ matrix.target }}"
          fi

      - name: Check binary size and musl static linkage
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ runner.os }}" = "Windows" ]; then
            bin="target/${{ matrix.target }}/release/oraclemcp.exe"
          else
            bin="target/${{ matrix.target }}/release/oraclemcp"
          fi
          if [ ! -f "$bin" ]; then
            echo "missing release binary: $bin" >&2
            exit 1
          fi
          size="$(wc -c < "$bin" | tr -d '[:space:]')"
          warn="${{ matrix.binary_warn_bytes }}"
          limit="${{ matrix.binary_limit_bytes }}"
          echo "binary=$bin"
          echo "target=${{ matrix.target }}"
          echo "size_bytes=$size"
          echo "warn_bytes=$warn"
          echo "budget_bytes=$limit"
          if [ "$size" -gt "$limit" ]; then
            echo "release binary exceeds size budget for ${{ matrix.target }}: $size > $limit bytes" >&2
            exit 1
          fi
          if [ "$size" -gt "$warn" ]; then
            echo "::warning::release binary for ${{ matrix.target }} is $size bytes, past the $warn-byte ratchet warn line (hard budget $limit bytes) — consider raising both bounds deliberately before this becomes a tag-time failure"
          fi
          case "${{ matrix.target }}" in
            *-unknown-linux-musl)
              file "$bin"
              if readelf -l "$bin" | grep -q 'INTERP'; then
                echo "musl release binary has a dynamic interpreter" >&2
                exit 1
              fi
              if readelf -d "$bin" 2>/dev/null | grep -q '(NEEDED)'; then
                echo "musl release binary has dynamic library dependencies" >&2
                exit 1
              fi
              ;;
          esac

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dist="oraclemcp-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/oraclemcp" "$dist/"
          ln -s oraclemcp "$dist/om"
          cp README.md LICENSE-APACHE LICENSE-MIT "$dist/"
          tar czf "$dist.tar.gz" "$dist"
          shasum -a 256 "$dist.tar.gz" > "$dist.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dist="oraclemcp-${{ matrix.target }}"
          mkdir "$dist"
          cp "target/${{ matrix.target }}/release/oraclemcp.exe" "$dist/"
          cp "target/${{ matrix.target }}/release/oraclemcp.exe" "$dist/om.exe"
          cp README.md LICENSE-APACHE LICENSE-MIT "$dist/"
          7z a "$dist.zip" "$dist" >/dev/null
          certutil -hashfile "$dist.zip" SHA256 > "$dist.zip.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: oraclemcp-${{ matrix.target }}
          path: |
            oraclemcp-${{ matrix.target }}.tar.gz*
            oraclemcp-${{ matrix.target }}.zip*
          if-no-files-found: error

  release:
    name: publish GitHub release
    # release-acceptance is a DIRECT need (not only transitive through
    # publish-crates) because publish-crates is skipped outright for
    # prerelease tags (its own `if`); without this edge + the matching
    # `result == 'success'` check below, a prerelease could publish without
    # ever waiting on the acceptance suite once `build` stopped depending on
    # it (plan §25.3 P1.1 — see the comment on `build.needs`).
    needs: [build, publish-crates, release-acceptance, web-build]
    if: >-
      ${{
        always() &&
        startsWith(github.ref, 'refs/tags/') &&
        needs.web-build.result == 'success' &&
        needs.build.result == 'success' &&
        needs.release-acceptance.result == 'success' &&
        (contains(github.ref_name, '-') || needs.publish-crates.result == 'success')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      # SBOM + provenance: actions/attest-build-provenance and cosign keyless
      # both mint a short-lived OIDC token to bind the signature/attestation to
      # this workflow's identity. attestations:write records the predicate in the
      # repository's attestation store.
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: oraclemcp-*-*-*
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ---- Supply-chain integrity (bead D3) ----
      # Generate a merged CycloneDX SBOM for the Rust workspace and embedded
      # dashboard SPA so operators (and a third party) can enumerate exactly
      # what each release artifact was built from.
      - name: Install CycloneDX SBOM generator
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-cyclonedx@0.5.9
      - name: Generate Rust CycloneDX SBOM
        run: |
          # Emit one CycloneDX 1.5 JSON SBOM per workspace crate (each adjacent
          # to its Cargo.toml as bom.json), enumerating all transitive deps.
          cargo cyclonedx --all --format json --spec-version 1.5 \
            --override-filename bom
          mkdir -p artifacts
      - name: Merge Rust and dashboard SBOMs
        run: |
          bash scripts/merge_release_sbom.sh \
            crates/oraclemcp/bom.json \
            web/dist/oraclemcp-dashboard.cyclonedx.json \
            "artifacts/oraclemcp-${{ steps.version.outputs.version }}.cdx.json"
          bash scripts/release_sbom_check.sh --artifact \
            "artifacts/oraclemcp-${{ steps.version.outputs.version }}.cdx.json"

      # Attach an SLSA-style build provenance attestation to every release
      # artifact and to the SBOM. The attestation is recorded in the repo's
      # attestation store and is verifiable with `gh attestation verify`.
      - name: Attest build provenance for release artifacts
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-path: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/oraclemcp-${{ steps.version.outputs.version }}.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      # Downloadable cosign blob attestations for the installer and for
      # operators who want a cosign-only archive verification path. The GitHub
      # attestation above remains the canonical hosted provenance record.
      - name: Generate cosign blob attestations
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/*.tar.gz artifacts/*.zip artifacts/*.cdx.json; do
            predicate="$(mktemp)"
            jq -n \
              --arg artifact "$(basename "$f")" \
              --arg repo "$GITHUB_REPOSITORY" \
              --arg ref "$GITHUB_REF" \
              --arg sha "$GITHUB_SHA" \
              --arg workflow "$GITHUB_WORKFLOW" \
              --arg run_id "$GITHUB_RUN_ID" \
              --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
              '{
                buildDefinition: {
                  buildType: "https://github.com/MuhDur/oraclemcp/.github/workflows/release.yml",
                  externalParameters: {
                    repository: ("https://github.com/" + $repo),
                    ref: $ref,
                    workflow: $workflow,
                    run_id: $run_id,
                    run_attempt: $run_attempt,
                    artifact: $artifact
                  },
                  internalParameters: {
                    github_sha: $sha
                  }
                },
                runDetails: {
                  builder: {
                    id: ("https://github.com/" + $repo + "/actions/runs/" + $run_id)
                  },
                  metadata: {
                    invocationId: ($run_id + "-" + $run_attempt)
                  }
                }
              }' > "$predicate"
            cosign attest-blob \
              --yes \
              --type slsaprovenance1 \
              --predicate "$predicate" \
              --bundle "$f.attestation.sigstore.json" \
              "$f"
          done

      # Keyless (Fulcio/Rekor) signatures over each archive. cosign binds the
      # signature to this workflow's OIDC identity; the .sig/.crt pair is what
      # `cosign verify-blob` checks against that identity at verification time.
      - name: Sign release archives (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          shopt -s nullglob
          for f in artifacts/*.tar.gz artifacts/*.zip artifacts/*.cdx.json; do
            cosign sign-blob \
              --output-signature "$f.sig" \
              --output-certificate "$f.crt" \
              "$f"
          done

      - name: Generate Homebrew and winget manifests
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/render_distribution_manifests.sh artifacts

      - name: Publish release with checksums, SBOM, and signatures
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          name: ${{ github.ref_name }}
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.tar.gz.sig
            artifacts/*.tar.gz.crt
            artifacts/*.tar.gz.attestation.sigstore.json
            artifacts/*.zip
            artifacts/*.zip.sha256
            artifacts/*.zip.sig
            artifacts/*.zip.crt
            artifacts/*.zip.attestation.sigstore.json
            artifacts/*.cdx.json
            artifacts/*.cdx.json.sig
            artifacts/*.cdx.json.crt
            artifacts/*.cdx.json.attestation.sigstore.json
            artifacts/distribution-manifests/homebrew/Formula/oraclemcp.rb
            artifacts/distribution-manifests/winget/**/*.yaml
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Publish the workspace to crates.io on a non-pre-release version tag before
  # the GitHub release exists. The script is idempotent for release retries and
  # skips exact versions that are already on crates.io.
  publish-crates:
    name: Publish to crates.io
    # release-acceptance now runs concurrently with `build` (see build.needs);
    # requiring it here (rather than on `build`) is what keeps publishing
    # gated on the full acceptance suite while still letting the two long
    # jobs overlap instead of serializing.
    needs: [build, release-acceptance]
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: crates-io
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish_crates.sh

  docker:
    name: publish GHCR image
    needs: [release, web-build]
    if: >-
      ${{
        always() &&
        startsWith(github.ref, 'refs/tags/') &&
        needs.release.result == 'success'
      }}
    runs-on: ubuntu-latest
    environment: ghcr
    permissions:
      contents: read
      packages: write
      # Image provenance + keyless signing need the OIDC token; attestations
      # are recorded against this workflow identity.
      id-token: write
      attestations: write
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - name: Resolve Docker tags
        id: tags
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "tags<<EOF"
            echo "ghcr.io/muhdur/oraclemcp:${version}"
            if [[ "$version" != *-* ]]; then
              echo "ghcr.io/muhdur/oraclemcp:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # SLSA provenance baked into the image manifest by BuildKit. `mode=max`
          # records the full build graph (base images, build steps).
          provenance: mode=max
          sbom: true
      # GitHub-native build provenance attestation for the pushed image, keyed
      # by its immutable digest. Verifiable with `gh attestation verify oci://...`.
      - name: Attest image build provenance
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ghcr.io/muhdur/oraclemcp
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      # Keyless cosign signature over the image digest (not a mutable tag).
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign --recursive "ghcr.io/muhdur/oraclemcp@${{ steps.build.outputs.digest }}"
      - name: Verify pushed image
        run: docker buildx imagetools inspect "ghcr.io/muhdur/oraclemcp:${GITHUB_REF_NAME#v}"
      - name: Smoke pushed image
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/muhdur/oraclemcp:${version}"
          docker pull "$image"
          docker run --rm --entrypoint /bin/bash -e EXPECTED_VERSION="$version" "$image" -lc '
            set -euo pipefail
            if command -v gcc >/dev/null 2>&1; then
              echo "runtime image unexpectedly contains gcc" >&2
              exit 1
            fi
            oraclemcp info >/tmp/oraclemcp-info.json
            grep -q "\"version\": \"$EXPECTED_VERSION\"" /tmp/oraclemcp-info.json
            oraclemcp capabilities | head -c 1200 >/dev/null
          '

  publish-mcp-registry:
    name: publish MCP registry entry
    needs: docker
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: mcp-registry
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install mcp-publisher
        run: bash scripts/install_mcp_publisher.sh
      - name: Authenticate to the MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish

  verify-mcp-registry:
    name: verify MCP registry entry
    needs: publish-mcp-registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Verify MCP registry listing
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/muhdur/oraclemcp:${version}"
          for _ in $(seq 1 30); do
            if curl -fsS 'https://registry.modelcontextprotocol.io/v0/servers?search=oraclemcp&limit=20' |
              jq -e --arg version "$version" --arg image "$image" '
                .servers[]
                | select(.server.name == "io.github.MuhDur/oraclemcp")
                | select(.server.version == $version)
                | select(any(.server.packages[]?; .registryType == "oci" and .identifier == $image))
              ' >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "MCP registry did not list io.github.MuhDur/oraclemcp $version with $image" >&2
          exit 1
