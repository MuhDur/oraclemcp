name: Docker image

# Manual rebuild path for the thin-driver container image. Normal tag releases
# publish this image from release.yml after tests, GitHub release, and crates.io
# publishing have succeeded. This workflow rebuilds an image for the current
# Cargo/server.json version without cutting a new release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag. Empty means the current Cargo package version."
        required: false
        default: ""
      variant:
        description: "Image variant to build."
        required: false
        default: "core"
        type: choice
        options:
          - core
          - plsql-intelligence

permissions:
  contents: read
  packages: write
  # Match release.yml: image provenance attestation + keyless signing need OIDC.
  id-token: write
  attestations: write

env:
  RUST_TOOLCHAIN: nightly-2026-05-11
  NODE_VERSION: 22.17.0

jobs:
  docker:
    name: build + push (GHCR)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Resolve version and variant
        id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_VARIANT: ${{ github.event.inputs.variant }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "oraclemcp") | .version')"
          fi
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid image version: $version" >&2
            exit 1
          }
          variant="${INPUT_VARIANT:-core}"
          case "$variant" in
            core)
              target="runtime"
              expected_engine="false"
              image="ghcr.io/muhdur/oraclemcp:${version}"
              tags="$(printf 'ghcr.io/muhdur/oraclemcp:%s\nghcr.io/muhdur/oraclemcp:latest\n' "$version")"
              ;;
            plsql-intelligence)
              target="runtime-plsql-intelligence"
              expected_engine="true"
              image="ghcr.io/muhdur/oraclemcp:${version}-plsql-intelligence"
              tags="$(printf 'ghcr.io/muhdur/oraclemcp:%s-plsql-intelligence\nghcr.io/muhdur/oraclemcp:plsql-intelligence-latest\n' "$version")"
              ;;
            *)
              echo "invalid image variant: $variant" >&2
              exit 1
              ;;
          esac
          {
            echo "v=$version"
            echo "variant=$variant"
            echo "target=$target"
            echo "expected_engine=$expected_engine"
            echo "image=$image"
            echo "tags<<EOF"
            printf '%s\n' "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build dashboard bundle
        run: |
          npm ci
          npm run check
        working-directory: web

      - name: Validate release metadata
        env:
          RELEASE_TAG: v${{ steps.ver.outputs.v }}
        run: bash scripts/release_preflight.sh

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ steps.ver.outputs.target }}
          push: true
          tags: ${{ steps.ver.outputs.tags }}
          # SLSA provenance + SBOM baked into the manifest, matching release.yml.
          provenance: mode=max
          sbom: true

      # GitHub-native build provenance attestation, keyed by the image digest.
      - name: Attest image build provenance
        uses: actions/attest-build-provenance@v3.2.0
        with:
          subject-name: ghcr.io/muhdur/oraclemcp
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Keyless cosign signature over the image digest.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.10.1
      - name: Sign image (keyless)
        env:
          COSIGN_YES: "true"
        run: cosign sign --recursive "ghcr.io/muhdur/oraclemcp@${{ steps.build.outputs.digest }}"

      - name: Smoke pushed image
        shell: bash
        env:
          IMAGE: ${{ steps.ver.outputs.image }}
          VERSION: ${{ steps.ver.outputs.v }}
          EXPECTED_ENGINE: ${{ steps.ver.outputs.expected_engine }}
        run: |
          set -euo pipefail
          docker pull "$IMAGE"
          docker run --rm --entrypoint /bin/bash \
            -e EXPECTED_VERSION="$VERSION" \
            -e EXPECTED_ENGINE="$EXPECTED_ENGINE" \
            "$IMAGE" -lc '
            set -euo pipefail
            if command -v gcc >/dev/null 2>&1; then
              echo "runtime image unexpectedly contains gcc" >&2
              exit 1
            fi
            oraclemcp info >/tmp/oraclemcp-info.json
            grep -q "\"version\": \"$EXPECTED_VERSION\"" /tmp/oraclemcp-info.json
            grep -q "\"engine\": $EXPECTED_ENGINE" /tmp/oraclemcp-info.json
            if [ "$EXPECTED_ENGINE" = "true" ]; then
              grep -q "oracle_plsql_parse" /tmp/oraclemcp-info.json
            else
              ! grep -q "oracle_plsql_parse" /tmp/oraclemcp-info.json
            fi
            oraclemcp capabilities | head -c 1200 >/dev/null
          '
