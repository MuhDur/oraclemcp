name: Docker image

# Build the Instant-Client container image and push it to GHCR
# (ghcr.io/muhdur/oraclemcp). Runs on a version tag or on demand. The image
# carries the io.modelcontextprotocol.server.name label the MCP registry needs.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: build + push (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "v=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "v=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/muhdur/oraclemcp:${{ steps.ver.outputs.v }}
            ghcr.io/muhdur/oraclemcp:latest
          provenance: false
