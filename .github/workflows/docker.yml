name: Docker image

# Manual rebuild path for the thin-driver container image. Normal tag releases
# publish this image from release.yml after tests, GitHub release, and crates.io
# publishing have succeeded. This workflow rebuilds an image for the current
# Cargo/server.json version without cutting a new release.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag. Empty means the current Cargo package version."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  RUST_TOOLCHAIN: nightly-2026-05-11

jobs:
  docker:
    name: build + push (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Resolve version
        id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          else
            version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "oraclemcp") | .version')"
          fi
          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid image version: $version" >&2
            exit 1
          }
          echo "v=$version" >> "$GITHUB_OUTPUT"

      - name: Validate release metadata
        env:
          RELEASE_TAG: v${{ steps.ver.outputs.v }}
        run: bash scripts/release_preflight.sh

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/muhdur/oraclemcp:${{ steps.ver.outputs.v }}
            ghcr.io/muhdur/oraclemcp:latest
          provenance: false

      - name: Smoke pushed image
        shell: bash
        env:
          IMAGE: ghcr.io/muhdur/oraclemcp:${{ steps.ver.outputs.v }}
          VERSION: ${{ steps.ver.outputs.v }}
        run: |
          set -euo pipefail
          docker pull "$IMAGE"
          docker run --rm --entrypoint /bin/bash -e EXPECTED_VERSION="$VERSION" "$IMAGE" -lc '
            set -euo pipefail
            if command -v gcc >/dev/null 2>&1; then
              echo "runtime image unexpectedly contains gcc" >&2
              exit 1
            fi
            oraclemcp info >/tmp/oraclemcp-info.json
            grep -q "\"version\": \"$EXPECTED_VERSION\"" /tmp/oraclemcp-info.json
            oraclemcp capabilities | head -c 1200 >/dev/null
          '
