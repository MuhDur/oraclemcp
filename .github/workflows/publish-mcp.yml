name: Publish to MCP Registry

# Lists oraclemcp in the official MCP registry (registry.modelcontextprotocol.io)
# under the io.github.MuhDur namespace, authenticated via GitHub OIDC — the
# repository's own identity proves namespace ownership, so no token/secret.
#
# server.json references the OCI image ghcr.io/muhdur/oraclemcp (built by
# docker.yml). The registry validates that the image is PUBLIC and carries the
# io.modelcontextprotocol.server.name label. Run this AFTER docker.yml has
# pushed the image and the GHCR package is public. Dispatch-only so it never
# races the image build on a tag.
on:
  workflow_dispatch: {}

env:
  RUST_TOOLCHAIN: nightly-2026-05-11

jobs:
  validate:
    name: validate server.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Validate workflow dependency policy
        run: bash scripts/workflow_supply_chain_check.sh
      - name: Validate release metadata
        env:
          # Operator ruling 2026-07-21 (plan v8 §Z2): mutation seal advisory
          # this train — loud warning, never a release blocker.
          ALLOW_STALE_MUTATION_SEAL: "1"
        run: bash scripts/release_preflight.sh

  publish:
    name: publish server.json
    needs: validate
    runs-on: ubuntu-latest
    environment: mcp-registry
    timeout-minutes: 10
    permissions:
      id-token: write # required for GitHub OIDC authentication
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install mcp-publisher
        run: bash scripts/install_mcp_publisher.sh
      - name: Authenticate to the MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json
        run: ./mcp-publisher publish

  verify:
    name: verify registry listing
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Verify MCP registry listing
        shell: bash
        run: |
          set -euo pipefail
          version="$(jq -r '.version' server.json)"
          image="$(jq -r '.packages[] | select(.registryType == "oci") | .identifier' server.json)"
          for _ in $(seq 1 30); do
            if curl -fsS 'https://registry.modelcontextprotocol.io/v0/servers?search=oraclemcp&limit=20' |
              jq -e --arg version "$version" --arg image "$image" '
                .servers[]
                | select(.server.name == "io.github.MuhDur/oraclemcp")
                | select(.server.version == $version)
                | select(any(.server.packages[]?; .registryType == "oci" and .identifier == $image))
              ' >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "MCP registry did not list io.github.MuhDur/oraclemcp $version with $image" >&2
          exit 1
