name: Mutation Safety

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "16"
  CARGO_TARGET_DIR: /home/runner/work/_cargo-target-server
  RUST_TOOLCHAIN: nightly-2026-05-11

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation-safety:
    name: guard + audit cargo-mutants
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run mutation safety gate
        run: bash scripts/mutation_safety_gate.sh run

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-safety-results
          path: |
            target/mutants/summary.txt
            target/mutants/*.log
            target/mutants/*/mutants.out/outcomes.json
            target/mutants/*/mutants.out/missed.txt
          if-no-files-found: ignore
          retention-days: 30
