name: Mutation Safety

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      scope:
        description: Exact mutation surface
        required: true
        type: choice
        options: [guard, audit, core, db, dispatch]
      shard:
        description: Deterministic shard as I/N (N must keep the shard at <=32 mutants)
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "2"
  # Keep child cgroups below the smaller hosted-runner parent ceilings so the
  # events are attributed to, and observable in, the mutation shard itself.
  MUTATION_MEMMAX: 6G
  MUTATION_TASKSMAX: "384"
  RUST_TOOLCHAIN: nightly-2026-05-11

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Two <=32-mutant shards per scope per night. Each scope's fixed N is sized
  # from the current population; the runner refuses if source growth makes a
  # selected shard exceed the budget. `(run_number-1)*2 + offset` rotates every
  # index deterministically, completing the longest (core, N=128) cycle in 64
  # nights while artifacts remain available for 90 days.
  scheduled-shard:
    if: github.event_name == 'schedule'
    name: ${{ matrix.scope }} shard offset ${{ matrix.offset }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Operator ruling 2026-07-21 (plan v8 §Z2): the nightly rotation must
      # never red the front page on a resource-capped mutant. An OOM/TasksMax
      # hit records the shard errored/VOID (loud warning, no seal evidence,
      # never graded caught) and the lane stays green. Seal campaigns and
      # manual dispatches keep the strict default (fail).
      MUTATION_OOM_POLICY: warn
    strategy:
      fail-fast: false
      matrix:
        include:
          - scope: guard
            total: 40
            offset: 0
          - scope: guard
            total: 40
            offset: 1
          - scope: audit
            total: 24
            offset: 0
          - scope: audit
            total: 24
            offset: 1
          - scope: core
            total: 128
            offset: 0
          - scope: core
            total: 128
            offset: 1
          - scope: db
            total: 72
            offset: 0
          - scope: db
            total: 72
            offset: 1
          - scope: dispatch
            total: 40
            offset: 0
          - scope: dispatch
            total: 40
            offset: 1
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Prove seal and shard-integrity fail-closed behavior
        run: |
          bash scripts/mutation_safety_gate.sh self-test
          python3 scripts/test_migrate_mutation_result.py
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install pinned cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Select and run deterministic shard
        id: mutation
        env:
          SCOPE: ${{ matrix.scope }}
          TOTAL: ${{ matrix.total }}
          OFFSET: ${{ matrix.offset }}
        run: |
          index=$(( ((GITHUB_RUN_NUMBER - 1) * 2 + OFFSET) % TOTAL + 1 ))
          shard="${index}/${TOTAL}"
          echo "mutation shard: scope=${SCOPE} shard=${shard}"
          bash scripts/mutation_safety_gate.sh run-shard --scope "$SCOPE" --shard "$shard"
          echo "shard=$shard" >> "$GITHUB_OUTPUT"
          echo "shard_dir=shard-${index}of${TOTAL}" >> "$GITHUB_OUTPUT"
      - name: Record mutation-lane attestation status
        # A VOID shard (MUTATION_OOM_POLICY=warn resource kill) exits 0 but did
        # NOT complete — never attest complete=PASS for it.
        if: ${{ steps.mutation.outputs.shard_void != '1' }}
        uses: ./.github/actions/test-attestation
        env:
          ORACLEMCP_TEST_ATTESTATION_KEY: ${{ secrets.ORACLEMCP_TEST_ATTESTATION_KEY }}
          ORACLEMCP_TEST_ATTESTATION_KEY_ID: ${{ vars.TEST_ATTESTATION_KEY_ID || 'github-actions-v1' }}
        with:
          enabled: ${{ vars.ENABLE_TEST_ATTESTATION == 'true' }}
          trusted-context: "true"
          lane: mutation-safety
          command: bash scripts/mutation_safety_gate.sh run-shard --scope ${{ matrix.scope }} --shard ${{ steps.mutation.outputs.shard }}
          tests: mutation-shard:${{ matrix.scope }}:${{ steps.mutation.outputs.shard }}:complete=PASS
          artifacts: target/mutants/${{ matrix.scope }}/${{ steps.mutation.outputs.shard_dir }}/integrity.json
          output-name: mutation-${{ matrix.scope }}-${{ steps.mutation.outputs.shard_dir }}.jsonl
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-${{ matrix.scope }}-${{ github.run_number }}-${{ matrix.offset }}
          # A disabled signer emits only a typed SKIP/BLOCKED status, never an
          # unsigned document shaped like a K1 attestation.
          path: |
            target/mutants/${{ matrix.scope }}/
            target/test-attestations/
          if-no-files-found: error
          retention-days: 90

  manual-shard:
    if: github.event_name == 'workflow_dispatch'
    name: manual mutation shard
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Prove seal and shard-integrity fail-closed behavior
        run: |
          bash scripts/mutation_safety_gate.sh self-test
          python3 scripts/test_migrate_mutation_result.py
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install pinned cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked
      - name: Run requested deterministic shard
        id: mutation
        env:
          SCOPE: ${{ inputs.scope }}
          SHARD: ${{ inputs.shard }}
        run: |
          set -euo pipefail
          bash scripts/mutation_safety_gate.sh run-shard --scope "$SCOPE" --shard "$SHARD"
          IFS=/ read -r shard_index shard_total <<<"$SHARD"
          echo "shard_dir=shard-${shard_index}of${shard_total}" >> "$GITHUB_OUTPUT"
      - name: Record mutation-lane attestation status
        uses: ./.github/actions/test-attestation
        env:
          ORACLEMCP_TEST_ATTESTATION_KEY: ${{ secrets.ORACLEMCP_TEST_ATTESTATION_KEY }}
          ORACLEMCP_TEST_ATTESTATION_KEY_ID: ${{ vars.TEST_ATTESTATION_KEY_ID || 'github-actions-v1' }}
        with:
          enabled: ${{ vars.ENABLE_TEST_ATTESTATION == 'true' }}
          trusted-context: "true"
          lane: mutation-safety
          command: bash scripts/mutation_safety_gate.sh run-shard --scope ${{ inputs.scope }} --shard ${{ inputs.shard }}
          tests: mutation-shard:${{ inputs.scope }}:${{ inputs.shard }}:complete=PASS
          artifacts: target/mutants/${{ inputs.scope }}/${{ steps.mutation.outputs.shard_dir }}/integrity.json
          output-name: mutation-${{ inputs.scope }}-${{ steps.mutation.outputs.shard_dir }}.jsonl
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-${{ inputs.scope }}-${{ github.run_number }}
          path: |
            target/mutants/${{ inputs.scope }}/
            target/test-attestations/
          if-no-files-found: error
          retention-days: 90
