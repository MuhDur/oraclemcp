name: Retired npm wrapper guard

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  retired:
    name: npm/npx release channel is retired
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Refuse npm publication
        shell: bash
        run: |
          cat >&2 <<'MSG'
          The oraclemcp npm/npx release channel is retired and not offered.
          Use the signed GitHub release archives, cargo-binstall, GHCR, Homebrew,
          winget, crates.io, or the MCP registry release flow instead.
          MSG
          exit 1
