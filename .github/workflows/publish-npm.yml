name: Publish npm wrapper

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, without the leading v"
        required: true
        type: string
      auth_mode:
        description: "npm auth mode: auto uses NPM_TOKEN when present; oidc ignores NPM_TOKEN for trusted publishing"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - token
          - oidc

permissions:
  contents: read

env:
  NODE_VERSION: 22.17.0

jobs:
  validate:
    name: validate exact npm release tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.inputs.outputs.version }}
      tag: ${{ steps.inputs.outputs.tag }}
      tag_commit: ${{ steps.provenance.outputs.tag_commit }}
      dist_tag: ${{ steps.inputs.outputs.dist_tag }}
      auth_mode: ${{ steps.inputs.outputs.auth_mode }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
      - name: Validate dispatch inputs as data
        id: inputs
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          REQUESTED_AUTH_MODE: ${{ inputs.auth_mode }}
        run: bash scripts/validate_npm_publish_input.sh
      - name: Check out the exact immutable release tag
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ steps.inputs.outputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Verify tag provenance and npm wrapper
        id: provenance
        env:
          RELEASE_TAG: ${{ steps.inputs.outputs.tag }}
          VERSION: ${{ steps.inputs.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse --verify "${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [ "$head_commit" != "$tag_commit" ]; then
            echo "checked-out commit $head_commit does not match release tag $RELEASE_TAG ($tag_commit)" >&2
            exit 1
          fi
          package_version="$(node -p "require('./npm/oraclemcp/package.json').version")"
          if [ "$package_version" != "$VERSION" ]; then
            echo "npm package version $package_version does not match release tag $RELEASE_TAG" >&2
            exit 1
          fi
          npm --prefix npm/oraclemcp test
          npm pack ./npm/oraclemcp --dry-run
          printf 'tag_commit=%s\n' "$tag_commit" >>"$GITHUB_OUTPUT"

  publish:
    name: publish npm wrapper
    needs: validate
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the validated release tag
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.validate.outputs.tag }}
      - name: Refuse tag movement after validation
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          VALIDATED_COMMIT: ${{ needs.validate.outputs.tag_commit }}
        shell: bash
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse --verify "${RELEASE_TAG}^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          if [ "$head_commit" != "$VALIDATED_COMMIT" ] || [ "$tag_commit" != "$VALIDATED_COMMIT" ]; then
            echo "release tag moved or checkout provenance changed after validation" >&2
            exit 1
          fi
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
      - name: Use npm with OIDC publishing support
        run: npm install -g npm@11.5.1
      - name: Publish npm package with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
          DIST_TAG: ${{ needs.validate.outputs.dist_tag }}
          AUTH_MODE: ${{ needs.validate.outputs.auth_mode }}
        shell: bash
        run: |
          set -euo pipefail
          if npm view "oraclemcp@$VERSION" version >/dev/null 2>&1; then
            echo "oraclemcp@$VERSION is already published on npm; skipping"
            exit 0
          fi
          case "$AUTH_MODE" in
            auto)
              if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
                echo "npm publish auth: token from npm environment NPM_TOKEN"
                npm whoami --registry=https://registry.npmjs.org/ >/dev/null
              else
                echo "npm publish auth: trusted publishing/OIDC because NPM_TOKEN is empty"
                unset NODE_AUTH_TOKEN NPM_CONFIG_USERCONFIG
              fi
              ;;
            token)
              if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
                echo "::error::auth_mode=token requires the npm environment NPM_TOKEN secret" >&2
                exit 1
              fi
              echo "npm publish auth: token from npm environment NPM_TOKEN"
              npm whoami --registry=https://registry.npmjs.org/ >/dev/null
              ;;
            oidc)
              echo "npm publish auth: trusted publishing/OIDC; npm must trust MuhDur/oraclemcp, workflow publish-npm.yml, environment npm"
              unset NODE_AUTH_TOKEN NPM_CONFIG_USERCONFIG
              ;;
            *)
              echo "::error::unsupported auth_mode '$AUTH_MODE'" >&2
              exit 1
              ;;
          esac

          set +e
          publish_output="$(npm publish ./npm/oraclemcp --provenance --access public --tag "$DIST_TAG" 2>&1)"
          publish_status=$?
          set -e
          printf '%s\n' "$publish_output"
          if [ "$publish_status" -ne 0 ]; then
            if printf '%s\n' "$publish_output" | grep -q 'E403'; then
              echo "::error::npm publish returned E403. For auth_mode=token, use an npm granular token with read/write access to the package or scope and 2FA bypass where required. For auth_mode=oidc, configure npm trusted publishing for owner MuhDur, repository oraclemcp, workflow publish-npm.yml, environment npm, allowed action npm publish." >&2
            fi
            exit "$publish_status"
          fi
