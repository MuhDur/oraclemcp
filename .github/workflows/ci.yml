name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  # Honour the advertised MSRV (rust-version = "1.88" in [workspace.package];
  # set by the floor of the dependency tree — darling 0.23 / time require 1.88).
  # A build (not test) is enough to catch use of newer std/lang features.
  msrv:
    name: build on MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  docs:
    name: cargo doc (builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Ensure the docs build; intra-doc-link lints are not gated (some target
      # feature-gated items that are absent in the default-feature doc build).
      - run: cargo doc --workspace --no-deps

  # The one-way engine-free boundary: no oraclemcp-* crate may import a plsql-*
  # engine crate. Trivially satisfied in this repo (there are no plsql-* crates),
  # but kept as a standing guard against an accidental re-introduction.
  boundary:
    name: engine-free boundary lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/oraclemcp_boundary_lint.sh

  supply-chain:
    name: cargo deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  # Keep the fail-closed classifier's differential fuzz target building. The
  # adversarial corpus itself runs in `test` (the oraclemcp-guard suite); this
  # only proves the cargo-fuzz harness still compiles on nightly.
  classifier-fuzz-smoke:
    name: classifier fuzz target builds (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - run: cargo +nightly fuzz build classify_fuzz
        working-directory: crates/oraclemcp-guard
