name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly-2026-05-11

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (-D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  # The thin-native line is pinned to nightly because asupersync/oracledb require
  # nightly-only language features. This is a build-only ratchet separate from
  # the test job so toolchain installation failures stay obvious.
  pinned-nightly:
    name: build on pinned nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  docs:
    name: cargo doc (builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      # Ensure the docs build; intra-doc-link lints are not gated (some target
      # feature-gated items that are absent in the default-feature doc build).
      - run: cargo doc --workspace --no-deps

  # The one-way engine-free boundary: no oraclemcp-* crate may import a plsql-*
  # engine crate. Trivially satisfied in this repo (there are no plsql-* crates),
  # but kept as a standing guard against an accidental re-introduction.
  boundary:
    name: engine-free boundary lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: bash scripts/oraclemcp_boundary_lint.sh

  release-metadata:
    name: release metadata sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: bash scripts/release_preflight.sh

  supply-chain:
    name: cargo deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  # The flagship artifact is the live-db binary; the default offline build
  # cannot connect to Oracle. rust-oracle bundles ODPI-C and links the Instant
  # Client at runtime, so this compiles in CI without the client present (a C
  # toolchain is enough). Build-only — live connectivity is covered by the
  # env-gated `live-xe` tests, not run here.
  live-db:
    name: build --features live-db
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p oraclemcp --features live-db

  # No deployment-specific identifiers or secrets may reach the public repo.
  # Generic heuristics run here; operators add a site denylist locally via
  # $ORACLEMCP_SENSITIVE_DENYLIST_FILE + a pre-push hook (see the script).
  sensitive-data:
    name: sensitive-data lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - run: bash scripts/sensitive_data_lint.sh

  # Compile the cargo-fuzz targets so they cannot silently rot (the classifier
  # and ALTER SESSION allowlist each ship one). Build-only; campaigns run
  # locally with `cargo +nightly-2026-05-11 fuzz run <target>`. Non-blocking:
  # cargo-fuzz + build-std is inherently churn-prone, so a transient toolchain
  # break here must not redden the rest of CI.
  fuzz-build:
    name: fuzz targets compile (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
        # Pin the gnu target: cargo-fuzz otherwise defaults to musl here, whose
        # static libc is incompatible with the ASan sanitizer.
      - run: cargo +${{ env.RUST_TOOLCHAIN }} fuzz build --target x86_64-unknown-linux-gnu
        working-directory: crates/oraclemcp-guard
