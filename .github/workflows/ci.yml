name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: nightly-2026-05-11
  NODE_VERSION: 22.17.0
  # Z2 (the fresh five-surface mutation campaign) is deferred out of the 0.9.1
  # train (plan v7 §Z2): a mutation seal binds to a source SHA and re-stales on
  # every safety-crate fix, so it is produced ONCE on the release candidate.
  # Deferring the per-push E_STALE_SEAL check keeps development CI green without a
  # ~12h throwaway campaign. This flag is intentionally set ONLY in this per-push
  # workflow — release.yml, docker.yml, and publish-mcp.yml do NOT set it, so an
  # actual release still hard-fails without a fresh seal.
  ALLOW_STALE_MUTATION_SEAL: 1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but let a main run finish so Swatinem/rust-cache
  # can SAVE the build cache. Cancelling main mid-run (as rapid pushes did) left
  # caches cold and made the heavy plsql/ANTLR compile take hours every time.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  web-build:
    name: web bundle (npm ci + vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Validate workflow dependency policy
        run: bash scripts/workflow_supply_chain_check.sh
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run check
        working-directory: web
      - name: Install K2 Chromium runtime
        run: npx playwright install --with-deps chromium
        working-directory: web
      - name: Verify K2 attestation UI in Chromium
        run: npm run test:e2e:k2
        working-directory: web
      - run: bash scripts/dashboard_bundle_check.sh
      - uses: actions/upload-artifact@v7
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
          if-no-files-found: error

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (-D warnings)
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy -p oraclemcp-core --all-targets --features dashboard-bundle -- -D warnings
      - run: cargo clippy -p oraclemcp --all-targets --features dashboard-bundle -- -D warnings

  test:
    name: cargo test
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: cargo test --workspace --all-targets
        run: |
          set -euo pipefail
          mkdir -p target/ci-logs
          cargo test --workspace --all-targets 2>&1 | tee target/ci-logs/cargo-test.log
      - run: bash scripts/oraclemcp_concurrency_lint.sh --test-output target/ci-logs/cargo-test.log
      - run: cargo test --workspace --doc
      # Runtime coverage of the optional feature interactions. The feature-powerset
      # job is now a compile+lint gate only (clippy over the powerset), so the
      # actual test behaviour under dashboard-bundle / mimalloc is exercised here.
      # Scoped to --lib/--bins on purpose: the dashboard-bundle runtime tests are
      # lib unit tests (core src/http/tests_stores.rs) and mimalloc only swaps the
      # allocator in main.rs, so this covers the feature-gated behaviour. Using
      # --all-targets would additionally re-run the feature-IRRELEVANT integration
      # tests (the ~100s build-state-sensitive trybuild capability_compile_fail and
      # the omcpb-dependent e2e_harness) under these features for no added signal.
      - run: cargo test -p oraclemcp-core --lib --features dashboard-bundle
      - run: cargo test -p oraclemcp --lib --bins --features dashboard-bundle,mimalloc
      # Golden-artifact discipline (D6.3d): CI VERIFIES goldens and never
      # regenerates them. A drift is a real regression, so UPDATE_GOLDENS must
      # never be set here and the golden suites must match the committed
      # fixtures. The shared `Scrubber` (tests/golden/support.rs) keeps them
      # deterministic and secret-free; the insta surface refuses to update in CI.
      - name: golden-artifact discipline (fail on any un-approved golden diff)
        run: |
          set -euo pipefail
          if [ -n "${UPDATE_GOLDENS:-}" ]; then
            echo "::error::UPDATE_GOLDENS must never be set in CI" >&2
            exit 1
          fi
          cargo test -p oraclemcp      --test golden_behavior
          cargo test -p oraclemcp      --test golden_scrubber_framework
          cargo test -p oraclemcp-core --test golden_behavior --test doctor_secret_golden
          cargo test -p oraclemcp-db   --test structured_schema_golden

  # D2 / TRI-1: measure only source lines changed by this PR, then enforce the
  # committed mutation floor. This deliberately does not gate on total line
  # coverage: unrelated or assertion-free tests can game a global percentage.
  # The evaluator's offline self-test pins both pass and fail behavior.
  coverage-ratchet:
    name: changed-line coverage + mutation floor
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CARGO_BUILD_JOBS: "2"
      CARGO_TARGET_DIR: target/coverage-ratchet
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: llvm-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: false
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-llvm-cov
      - run: bash scripts/coverage_ratchet.sh --self-test
      - name: Ratchet changed-line coverage against the change base
        id: coverage
        env:
          COVERAGE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          mkdir -p target/test-attestation-evidence
          bash scripts/coverage_ratchet.sh run --base "$COVERAGE_BASE" 2>&1 \
            | tee target/test-attestation-evidence/coverage-ratchet.log
          echo "base=$COVERAGE_BASE" >> "$GITHUB_OUTPUT"
      # The mutation-floor leg is advisory this train (ALLOW_STALE_MUTATION_SEAL,
      # operator ruling 2026-07-21 §Z2), so it must never be attested PASS: the
      # outcomes come from what the run recorded per leg, not from this file.
      - name: Derive attestation outcomes from the legs the run enforced
        id: legs
        run: |
          set -euo pipefail
          {
            echo 'tests<<ATTESTATION_OUTCOMES'
            bash scripts/coverage_ratchet.sh attestation-outcomes
            echo 'ATTESTATION_OUTCOMES'
          } >> "$GITHUB_OUTPUT"
          bash scripts/coverage_ratchet.sh attestation-outcomes
      - name: Record coverage-lane attestation status
        uses: ./.github/actions/test-attestation
        env:
          ORACLEMCP_TEST_ATTESTATION_KEY: ${{ secrets.ORACLEMCP_TEST_ATTESTATION_KEY }}
          ORACLEMCP_TEST_ATTESTATION_KEY_ID: ${{ vars.TEST_ATTESTATION_KEY_ID || 'github-actions-v1' }}
        with:
          enabled: ${{ vars.ENABLE_TEST_ATTESTATION == 'true' }}
          trusted-context: ${{ github.event_name == 'push' }}
          lane: coverage-ratchet
          command: bash scripts/coverage_ratchet.sh run --base ${{ steps.coverage.outputs.base }}
          tests: ${{ steps.legs.outputs.tests }}
          artifacts: target/test-attestation-evidence/coverage-ratchet.log
          output-name: coverage-ratchet.jsonl
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-ratchet-${{ github.run_number }}
          path: |
            target/test-attestation-evidence/coverage-ratchet.log
            target/test-attestations/
          if-no-files-found: error
          retention-days: 30

  feature-powerset:
    name: feature powerset (cargo hack)
    needs: web-build
    runs-on: ubuntu-latest
    # Compile + lint gate only: `cargo hack clippy` over the feature powerset of
    # the three feature-owning crates (oraclemcp-db / -core / oraclemcp). The
    # prior 3-pass (check+clippy+test) x --workspace x --all-targets was ~50min;
    # clippy already type-checks + compiles, and per-combo runtime behaviour is
    # covered by the default `test` job's dashboard-bundle / mimalloc runs.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      # Even the narrowed clippy powerset accretes a shared target/ dir; free the
      # preinstalled toolchains we don't use so a large combo can't hit "No space
      # left on device". rustup installs to ~/.cargo + ~/.rustup, not
      # hostedtoolcache, so removing the tool cache is safe here.
      - name: Free disk space for the feature powerset
        run: |
          sudo rm -rf \
            /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android \
            /opt/hostedtoolcache /usr/share/swift /usr/lib/jvm \
            /usr/local/share/powershell /usr/share/miniconda \
            /usr/local/lib/node_modules 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          df -h /
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-hack
      # Retro C5: assert (and, if needed, reclaim) free disk right before the
      # heavy build so a low-disk runner fails fast with a clear message
      # instead of dying mid-`cargo hack clippy` with an opaque ENOSPC.
      - name: Disk-free preflight (fail fast before ENOSPC mid-build)
        run: bash scripts/feature_powerset_disk_preflight.sh
      - run: bash scripts/oraclemcp_feature_powerset.sh

  ergonomics:
    name: agent ergonomics drift guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: bash scripts/oraclemcp_ergonomics_lint.sh

  installer:
    name: installer lint and built-artifact smoke
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install installer lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck musl-tools
      - run: cargo build -p oraclemcp --features dashboard-bundle --target x86_64-unknown-linux-musl
      - name: installer offline smoke
        env:
          ORACLEMCP_INSTALLER_REQUIRE_SHELLCHECK: "1"
          ORACLEMCP_INSTALLER_BUILT_BINARY: target/x86_64-unknown-linux-musl/debug/oraclemcp
        run: bash scripts/installer_lint_and_offline_smoke.sh --log

  windows-installer:
    name: Windows installer PSSA and dry-run
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: PSScriptAnalyzer and dry-run contract
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

          $parseErrors = $null
          [System.Management.Automation.PSParser]::Tokenize((Get-Content -LiteralPath "install.ps1" -Raw), [ref]$parseErrors) | Out-Null
          if ($parseErrors.Count -gt 0) {
            $parseErrors | Format-List | Out-String | Write-Error
            exit 1
          }

          Import-Module PSScriptAnalyzer
          $violations = Invoke-ScriptAnalyzer -Path "install.ps1" -Severity Error,Warning
          if ($violations) {
            $violations | Format-Table -AutoSize | Out-String | Write-Error
            exit 1
          }

          $offline = Join-Path $env:RUNNER_TEMP "oraclemcp-x86_64-pc-windows-msvc.zip"
          $dry = .\install.ps1 -DryRun -Version 9.9.9-installer-smoke -Prefix (Join-Path $env:RUNNER_TEMP "oraclemcp") -Offline $offline
          $dryText = $dry -join "`n"
          if ($dryText -notmatch "mode: offline") {
            throw "Windows installer dry-run did not report offline mode"
          }
          if ($dryText -match "service install --yes") {
            throw "Windows installer dry-run mutated service without -Service"
          }

          $service = .\install.ps1 -DryRun -Version 9.9.9-installer-smoke -Prefix (Join-Path $env:RUNNER_TEMP "oraclemcp") -Service -Yes -Profile db_ro -Listen 127.0.0.1:7070
          $serviceText = $service -join "`n"
          if ($serviceText -notmatch "service install --yes --name oraclemcp --listen 127.0.0.1:7070 --profile db_ro") {
            throw "Windows installer service dry-run did not show the consent-gated service command"
          }

  windows-rust:
    name: Rust workspace (Windows)
    needs: web-build
    runs-on: windows-latest
    env:
      # E1's mandatory direct-Cargo interceptor is the POSIX flock host guard.
      # This runner is single-tenant (the documented CI lease waiver), and a
      # Windows process cannot execute the repository's Bash rustc-wrapper.
      RUSTC_WRAPPER: ""
    # Scope: --lib --bins (see the test step). All Windows-specific risk (file
    # locking, subprocess spawn, TLS, paths, durable state) lives in unit tests;
    # the integration tests are covered on Linux and by the dedicated
    # windows-installer job, and recompiling every integration-test binary here
    # made an --all-targets build ~75-80 min (windows-msvc linking is slow). With
    # --lib --bins + reduced debuginfo this is far shorter; keep some headroom for
    # the first cold run after the profile/cache-key change.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      # This job previously had NO cache, so every run cold-compiled the whole
      # workspace and eventually exceeded the timeout. Cache like the Linux jobs
      # (separate key: rust-cache keys include the OS/target, so no collision).
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # rust-cache defaults to cache-on-failure:false. While a Windows test
          # is red the job fails, so the cache would never save and every run
          # would cold-compile (~60-70 min) and time out — a vicious cycle.
          # Save the compiled artifacts even on test failure so the NEXT run is
          # warm and fast; this is what lets us iterate on Windows test fixes.
          cache-on-failure: true
      - name: cargo test workspace on Windows
        env:
          # windows-msvc link time is dominated by debuginfo; drop it to cut the
          # compile. Tests run identically and panic `file:line` (via
          # #[track_caller]) is unaffected — only RUST_BACKTRACE frame detail is.
          CARGO_PROFILE_TEST_DEBUG: "0"
        # --lib --bins, not --all-targets: the Windows-specific behaviour is in
        # unit tests; the integration-test binaries add little Windows signal,
        # are covered on Linux, and roughly double the windows-msvc compile.
        run: cargo test --workspace --lib --bins

  release-acceptance:
    name: release acceptance suite (B.12)
    needs: [web-build, test, feature-powerset, ergonomics, installer, windows-installer, boundary]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: bash scripts/release_acceptance_ci_suite.sh --skip-feature-powerset

  # The thin-native line is pinned to nightly. Asupersync depends on specific nightly-only language features,
  # pulled in transitively by its dependency declaration; oracledb 0.8.4 is stable-clean
  # (see docs/TOOLCHAIN.md). This is a build-only ratchet separate from the test job
  # so toolchain installation failures stay obvious.
  pinned-nightly:
    name: build on pinned nightly
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build --workspace
      - run: cargo build -p oraclemcp --features dashboard-bundle

  # Multi-nightly early-warning (bead D4 / WP-D). ADVISORY ONLY — NOT a required
  # gate. The pinned nightly (nightly-2026-05-11) is already exhaustively covered
  # by the required jobs above (`build on pinned nightly`, `cargo test`, clippy),
  # so this job only builds and tests against the *floating* `nightly` channel:
  # an upcoming toolchain that will break the Asupersync stack surfaces here early,
  # before we deliberately re-pin (see docs/TOOLCHAIN.md + ADR-0001). A red square
  # here is an early warning to investigate, never a release blocker.
  #
  # continue-on-error keeps a *failure* from reddening required CI — but note a job
  # *timeout* (unlike a failure) still marks the whole run "cancelled" regardless of
  # continue-on-error. The redundant pinned leg used to live in this matrix too and
  # its `--all-targets` test kept hitting the 45m cap, cancelling the job and
  # poisoning otherwise-green run conclusions; it was removed and the timeout raised
  # to 60m for headroom. When bisecting a regression, temporarily add a pinned date
  # back to the matrix.
  multi-nightly:
    name: multi-nightly early-warning (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - nightly              # floating: the next toolchain we may have to adopt
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.toolchain }}
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo +${{ matrix.toolchain }} build --workspace
      - run: cargo +${{ matrix.toolchain }} test --workspace --all-targets

  docs:
    name: cargo doc (builds)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Ensure the docs build; intra-doc-link lints are not gated (some target
      # feature-gated items that are absent in the default-feature doc build).
      - run: cargo doc --workspace --no-deps

  # The one-way engine-free boundary: no oraclemcp-* crate may import a plsql-*
  # engine crate. Trivially satisfied in this repo (there are no plsql-* crates),
  # but kept as a standing guard against an accidental re-introduction.
  #
  # The driver-adapter seam (B2): every real `oracledb::` driver call stays
  # behind the single adapter file so an oracledb driver cut-over (e.g. the
  # completed 0.2.2 -> 0.5.x bump) touches exactly one file. Mirrored by the
  # `driver_seam` test in crates/oraclemcp-db so `cargo test` catches a leak too.
  boundary:
    name: engine-free boundary + surface + driver-seam + honesty + conformance accounting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          # Full history: the bead-close-evidence audit resolves commit SHAs
          # cited by close evidence; a shallow checkout reports SOURCE_SHA_ABSENT
          # for perfectly valid main-reachable commits (2026-07-20 red).
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: bash scripts/oraclemcp_boundary_lint.sh
      - run: bash scripts/oraclemcp_arch_fitness_lint.sh
      - run: bash scripts/oraclemcp_agent_surface_lint.sh
      - run: bash scripts/oraclemcp_driver_seam_lint.sh
      - run: bash scripts/oraclemcp_concurrency_lint.sh
      - run: bash scripts/oraclemcp_honesty_grep.sh
      - run: bash scripts/oraclemcp_fixture_lint.sh
      # Constitution rules 13-17: the swarm-discipline mechanisms must keep
      # refusing what they were built to refuse, and committed shell must not
      # reintroduce a wait that cannot end (rule 16).
      - name: swarm discipline (constitution rules 13-18)
        run: |
          bash scripts/swarm_discipline.sh --selftest
          bash scripts/swarm_discipline.sh unbounded-wait-lint
      # D4 (plan §25.7.3): the fuzz lane's nightly wall clock is one shard, not
      # the sum, and only while every shard stays sharded, timeout-bounded, and
      # carries -max_total_time. Asserted here so it cannot quietly regress.
      # P6: the manifest validator is a gate, so it must be able to FAIL. The
      # selftest feeds it a known-good graph and then one targeted mutation per
      # rule, requiring the matching error code each time.
      - name: plan-bead-graph lint selftest (P6)
        run: python3 scripts/plan_bead_graph_lint.py --selftest
      - name: fuzz lane budget (D4)
        run: |
          python3 scripts/ci_lane_budget.py --selftest
          python3 scripts/ci_lane_budget.py fuzz-bound
      - name: bead close evidence (native policy + post-close binding)
        run: bash scripts/check_bead_close_evidence.sh
      - name: entry-trace contract (required SKIP=FAIL)
        run: bash scripts/check_entry_trace_contract.sh
      # D6.3a: regenerate tests/conformance/COVERAGE.md from the clause manifest
      # and fail if it is stale (git-tracked doc would change) or if MUST-clause
      # coverage falls below 0.95.
      - name: conformance coverage-accounting (staleness + MUST >= 0.95 gate)
        run: bash scripts/gen_coverage_report.sh --check
      # D6.3b: every committed generated artifact must have a provenance entry.
      - name: generated-artifact provenance register gate
        run: bash scripts/provenance_check.sh

  # Public-API lock (B5; ADR-0002 mirror). oraclemcp-db is the canonical shared
  # foundation (ADR-0006) and oraclemcp-error / oraclemcp-guard are the
  # engine-free spine plsql-mcp converges onto, so their public API is a product
  # with two consumers. Two complementary gates keep it from drifting:
  #   * cargo public-api — exact-surface diff against the committed baselines in
  #     crates/<crate>/api/<crate>.txt (deterministic, offline). Refresh the
  #     baseline in the same PR for an INTENTIONAL change (see the script header
  #     and crates/oraclemcp-db/README.md).
  #   * cargo semver-checks — the SemVer contract: compares the working tree
  #     against the last published release and fails when the diff is not allowed
  #     by the version bump.
  # Both tools render rustdoc JSON, so they run on the pinned nightly. The tools
  # are not workspace dependencies (installed as standalone binaries), so they do
  # not enter the dependency graph or affect cargo deny.
  api-lock:
    name: public-API lock (cargo public-api + semver-checks)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-public-api,cargo-semver-checks
      # Exact public-API surface lock against the committed baselines.
      - run: bash scripts/oraclemcp_api_lock.sh
      # SemVer contract for each locked crate (working tree vs last published
      # release). Skipped automatically for a crate with no published baseline.
      - run: cargo semver-checks check-release -p oraclemcp-error -p oraclemcp-guard -p oraclemcp-db

  release-metadata:
    name: release metadata sync
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - run: bash scripts/release_preflight.sh

  supply-chain:
    name: cargo deny (advisories, licenses, bans, sources)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-deny
      - run: cargo deny check
      - run: cargo deny --features oraclemcp/dashboard-bundle,oraclemcp-core/dashboard-bundle check

  # The flagship artifact is the thin-db binary. Build-only — live connectivity
  # is covered by the env-gated `live-xe` tests, not run here.
  thin-db:
    name: build thin driver
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo build -p oraclemcp --features dashboard-bundle

  # The optional PL/SQL-intelligence distribution must remain independently
  # buildable and testable. This explicitly covers the feature excluded from
  # the curated powerset job and proves the advertised tool surface, rather
  # than merely compiling the optional dependency graph.
  plsql-intelligence:
    name: PL/SQL intelligence feature matrix
    needs: web-build
    runs-on: ubuntu-latest
    # The plsql-intelligence feature is defined only on the `oraclemcp` crate, so
    # `-p oraclemcp` exercises the whole feature surface; `--workspace` merely
    # recompiled every other crate's test targets under a second feature set,
    # which blew up compile + memory on the 2-core runner (multi-hour, cache-cold
    # thrashing). Bounded so a cold run can never run away again.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - run: cargo test -p oraclemcp --all-targets --features plsql-intelligence
      - name: Assert all eight PL/SQL tools are registered
        # Single source of truth for the advertised tool surface, runnable
        # offline (`bash scripts/plsql_feature_lane_check.sh`) so the lane is
        # provable without pushing to CI. It rebuilds with the feature and
        # asserts engine=true plus exactly the eight oracle_plsql_* tools.
        run: bash scripts/plsql_feature_lane_check.sh

  # Real Oracle FREE 23ai proves the current thin-driver line and the 23ai
  # VECTOR SQL surface. All connection values below are synthetic disposable
  # CI fixtures; no deployment or customer identifier is committed here.
  oracle-free23:
    name: Oracle FREE 23ai matrix + VECTOR smoke
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      free23:
        image: gvenzl/oracle-free:23-slim
        env:
          ORACLE_PASSWORD: E2EOracle23
          APP_USER: E2E_ORACLE
          APP_USER_PASSWORD: E2EOracle23
        ports:
          - 1522:1521
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 60
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          name: oraclemcp-dashboard-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # CI supplies a prebuilt binary to the harness. Local execution keeps the
      # harness on omcpb, which owns target isolation, memory caps, and the pin.
      - run: cargo build -p oraclemcp --bin oraclemcp --features dashboard-bundle
      - name: Grant DBMS_FLASHBACK to the 23ai app user for SCN capture
        # The governed read path captures the snapshot SCN via
        # DBMS_FLASHBACK.GET_SYSTEM_CHANGE_NUMBER (V$DATABASE only as a fallback).
        # The gvenzl app user has neither by default, so every governed read on
        # this lane fails closed (ORA-00904 then ORA-00942). Grant the capability
        # the design expects. Synthetic disposable CI DB; the SYSTEM password is
        # the committed fixture value in this job's service env.
        run: |
          python3 -m pip install --quiet --disable-pip-version-check oracledb
          python3 -c "
          import oracledb
          c = oracledb.connect(user='sys', password='E2EOracle23', dsn='localhost:1522/FREEPDB1', mode=oracledb.AUTH_MODE_SYSDBA)
          c.cursor().execute('GRANT EXECUTE ON DBMS_FLASHBACK TO E2E_ORACLE')
          c.commit()
          print('granted EXECUTE ON DBMS_FLASHBACK to E2E_ORACLE')
          "
      - name: 23ai matrix lane and VECTOR_DISTANCE smoke
        env:
          ORACLEMCP_LIVE_XE: "1"
          ORACLEMCP_ORACLE_MATRIX_BINARY: target/debug/oraclemcp
          ORACLE_MATRIX_FREE23_DSN: localhost:1522/FREEPDB1
          ORACLE_MATRIX_FREE23_USER: E2E_ORACLE
          ORACLE_MATRIX_FREE23_PASSWORD: E2EOracle23
        run: bash scripts/e2e/oracle_version_matrix.sh --log --lane free23

  # No deployment-specific identifiers or secrets may reach the public repo.
  # Generic heuristics run here; operators add a site denylist locally via
  # $ORACLEMCP_SENSITIVE_DENYLIST_FILE + a pre-push hook (see the script).
  sensitive-data:
    name: sensitive-data lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: bash scripts/secret_scan.sh

  # Compile every cargo-fuzz target so it cannot silently rot: guard classifier
  # + ALTER SESSION, audit-chain verification, and OAuth bearer validation.
  # Build-only; campaigns run
  # locally with `cargo +nightly-2026-05-11 fuzz run <target>`. Non-blocking:
  # cargo-fuzz + build-std is inherently churn-prone, so a transient toolchain
  # break here must not redden the rest of CI.
  fuzz-build:
    name: fuzz targets compile (nightly)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # PRs restore the main cache but never save (their short-lived
          # merge-ref caches would evict the useful main population).
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2
        with:
          tool: cargo-fuzz
        # Pin the gnu target: cargo-fuzz otherwise defaults to musl here, whose
        # static libc is incompatible with the ASan sanitizer.
      - name: Build guard fuzz targets
        run: cargo +${{ env.RUST_TOOLCHAIN }} fuzz build --target x86_64-unknown-linux-gnu
        working-directory: crates/oraclemcp-guard
      - name: Build audit fuzz targets
        run: cargo +${{ env.RUST_TOOLCHAIN }} fuzz build --target x86_64-unknown-linux-gnu
        working-directory: crates/oraclemcp-audit
      - name: Build auth fuzz targets
        run: cargo +${{ env.RUST_TOOLCHAIN }} fuzz build --target x86_64-unknown-linux-gnu
        working-directory: crates/oraclemcp-auth
