version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Vienna
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # One grouped PR per week instead of one full CI run per action bump.
    # SHA-pinned action updates make coarser bisection an acceptable trade.
    groups:
      github-actions-weekly:
        patterns:
          - "*"
