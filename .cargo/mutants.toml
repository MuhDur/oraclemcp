# cargo-mutants configuration — D6.4 mutation-safety gate
# (bead oraclemcp-release-073-iec3.4.4 / plan §D6.4).
#
# SCOPE: the two safety-critical crates only — the fail-closed statement
# classifier / purity prover (`oraclemcp-guard`) and the append-only audit
# hash-chain (`oraclemcp-audit`). These are THE proof the safety tests aren't
# placebo: a mutant that survives is a classification (or a chain check) the
# tests do not pin. Everything else in the workspace is out of scope for this
# gate — it is invoked scoped per-crate with
#   cargo mutants -p oraclemcp-guard -p oraclemcp-audit
# by scripts/mutation_safety_gate.sh (nightly CI + the D3.2 local pre-tag gate).
#
# The `examine_globs` below mean that even a bare `cargo mutants` in this repo
# only mutates the safety core (the documented mutation surface); pass an
# explicit --file / -p to mutate anything else deliberately.
examine_globs = [
  "crates/oraclemcp-guard/src/**/*.rs",
  "crates/oraclemcp-audit/src/**/*.rs",
]

# Per-mutant timeout policy. The safety-core unit + proptest suites are fast
# (proptest = 256 cases, a few seconds), so the auto-derived timeout (baseline
# test time x multiplier) is small; the floor + multiplier below keep a mutant
# that induces an infinite loop / hang from stalling the whole run without
# spuriously timing out an honest-but-slightly-slower mutant.
minimum_test_timeout = 60
timeout_multiplier = 6.0
build_timeout_multiplier = 5.0
