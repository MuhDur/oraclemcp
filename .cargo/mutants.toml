# cargo-mutants configuration — D3 / TRI-2 mutation-safety gate, expanding the
# original D6.4 guard+audit lane (plan §27.2 C3 / §32.2 TRI-2).
#
# SCOPE (TRI-2): guard, audit, core, db, and the server dispatch module. These
# are the control surfaces where an assertion-free test is especially
# dangerous: statement classification, audit integrity, runtime policy, DB
# execution, and the final tool-dispatch boundary.
#
# The `examine_globs` below mean that even a bare `cargo mutants` in this repo
# only mutates the documented control surface. The runner always adds an
# explicit package + file filter, so every integrity sidecar names one scope.
examine_globs = [
  "crates/oraclemcp-guard/src/**/*.rs",
  "crates/oraclemcp-audit/src/**/*.rs",
  "crates/oraclemcp-core/src/**/*.rs",
  "crates/oraclemcp-db/src/**/*.rs",
  "crates/oraclemcp/src/dispatch/*.rs",
]

# Per-mutant timeout policy. The explicit runner timeout wins in CI; these
# values keep a direct cargo-mutants invocation bounded too.
minimum_test_timeout = 60
timeout_multiplier = 6.0
build_timeout_multiplier = 5.0
