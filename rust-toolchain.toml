# This branch is pinned to NIGHTLY Rust.
#
# The thin-native migration depends on asupersync/oracledb, and asupersync uses
# nightly-only language features. There is no stable MSRV for this line; bump
# this date deliberately with asupersync/oracledb upgrades and CI workflow pins.
[toolchain]
channel = "nightly-2026-05-11"
components = ["rustfmt", "clippy"]
