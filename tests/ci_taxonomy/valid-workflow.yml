name: Fixture CI

on:
  push:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  required:
    name: required gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
  advisory:
    name: floating gate
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - run: echo advisory
