[package]
name = "oraclemcp-core"
version = "0.2.1"
description = "MCP protocol surface, Tool/ToolRegistry contract and capabilities for the oraclemcp server."
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
oraclemcp-error = { path = "../oraclemcp-error", version = "0.2.1" }
oraclemcp-config = { path = "../oraclemcp-config", version = "0.2.1" }
oraclemcp-db = { path = "../oraclemcp-db", version = "0.2.1" }
oraclemcp-guard = { path = "../oraclemcp-guard", version = "0.2.1" }
oraclemcp-audit = { path = "../oraclemcp-audit", version = "0.2.1" }
oraclemcp-auth = { path = "../oraclemcp-auth", version = "0.2.1" }
oraclemcp-telemetry = { path = "../oraclemcp-telemetry", version = "0.2.1" }
rmcp = { version = "1.7", features = ["server", "transport-io", "transport-streamable-http-server"] }
axum = "0.8"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
thiserror.workspace = true
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "sync", "time"] }
toml = "0.8"
tracing.workspace = true
wait-timeout = "0.2"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "net"] }
tower = { version = "0.5", features = ["util"] }
rcgen = "0.13"

[lints]
workspace = true
