# oraclemcp profiles.toml — generated by `oraclemcp setup --discover`.
# Governed, least-privilege connection profiles (read-only by default).
# Self-documenting: required keys are set; every optional key is present
# but commented with a one-line help string using its exact name, so
# uncommenting yields a valid key. See oraclemcp.example.toml for the full
# worked reference and docs/configuration.md for the field reference.

schema_version = 2
# Profile used when the launcher passes no `serve --profile <name>`; set when unambiguous.
# default_profile = "pick_one"
# Optional least-privilege profile for fleet-wide DB observability; unset degrades to self-lane/local telemetry.
# monitor_profile = "monitor_ro"

# Native Streamable HTTP transport (off by default; stdio-only). See oraclemcp.example.toml [http].

# Out-of-band hash-chained audit log. See oraclemcp.example.toml [audit]. key_ref MUST be set before any profile raises max_level above READ_ONLY, or startup fails closed.

# ── Governed, least-privilege posture (read-only by default) ──────────────
# Discovery writes every profile capped at READ_ONLY on BOTH max_level and
# default_level, set explicitly so the ceiling is legible here and never
# relies on a default. A profile is not marked protected and no level is
# raised on your behalf.
#
# Least-privilege account: point credential_ref at a DEDICATED Oracle
# account granted only CONNECT and SELECT — never an application-owner or
# SYSDBA/SYSTEM login. The password lives only in the environment variable
# the discovery report names; it is never written to this file.
#
# Before you raise any profile's max_level above READ_ONLY, deliberately
# edit that max_level AND configure [audit].key_ref first: the server fails
# closed at startup if a level above READ_ONLY is reachable without an audit
# signing key.
#
# Each profile below is UNVERIFIED until you export its
# ORACLE_<NAME>_PASSWORD and run `oraclemcp doctor --online`.

[[profiles]]
# Unverified until you export ORACLE_SALES_RO_PASSWORD and run `oraclemcp doctor --online`.
name = "sales_ro"
description = "Read-only profile for Oracle Net service SALES_RO"
connect_string = "SALES_RO"
# Oracle username; set only when a least-privilege convention is known, else commented (none for wallet / OS-auth / OCI-IAM).
# username = "APP_READONLY"
credential_ref = "env:ORACLE_SALES_RO_PASSWORD"
# Path to an allowlisted `ALTER SESSION …` login script run on lease acquire.
# login_script = "/home/operator/login.sql"
# Inline allowlist-validated `ALTER SESSION SET …` statements run on lease acquire.
# login_statements = ["ALTER SESSION SET NLS_LANGUAGE = english"]
# Trusted local session setup, authored by the profile owner, never accepted from agent tool calls.
# trusted_session_statements = ["BEGIN DBMS_OUTPUT.ENABLE(500000); END;"]
# Per-round-trip Oracle call timeout, in seconds (default 30 when omitted).
# call_timeout_seconds = 30
# Oracle Net transport connect timeout, in seconds (default: the thin driver's 20s).
# connect_timeout_seconds = 20
# Session Data Unit request size for the thin driver (512..=65535 bytes; negotiated when unset).
# sdu = 32768
max_level = "READ_ONLY"
default_level = "READ_ONLY"
# Production profile: pins the ceiling immutable; requires max_level = READ_ONLY and rejects literal: secret refs.
# protected = true
# Require HMAC signatures for operator-defined custom tools on this profile (implied by protected).
# require_signed_tools = true
# Mark target as a read-only Active Data Guard standby: forces READ_ONLY regardless of max_level.
# read_only_standby = false
# Per-profile MCP exposure; default exposed (opt-out). Set false to hide this profile from the agent surface.
# mcp_exposed = false
# Browser dashboard DDL/Admin apply opt-in; never raises max_level or bypasses preview/confirm/rollback/audit.
# dashboard_ddl_workbench = false
# Name of a profile to inherit unset fields from (shallow-merge).
# base = "another_profile"
# [profiles.session_identity] end-to-end Oracle session identity (program/machine/module/action/client_identifier/…).
# [profiles.session_identity]
# program = "oraclemcp"
# module = "oraclemcp"
# action = "inspect"
# client_identifier = "agent"
# [profiles.pool] local client-side connection pool for stateless catalog/metadata reads.
# [profiles.pool]
# max_size = 4
# min_idle = 1
# acquire_timeout_secs = 5
# statement_cache_size = 50
# [profiles.oci] OCI / Autonomous DB fields (wallet_location, wallet_password_ref, DN matching, SNI, IAM token).
# [profiles.oci]
# wallet_location = "/etc/oracle/wallet"
# [profiles.drcp] Database Resident Connection Pooling server routing (pooled, connection_class, purity).
# [profiles.drcp]
# pooled = true
# connection_class = "ORACLE_MCP_AGENTS"
# purity = "reuse"
# [profiles.proxy_auth] thin proxy authentication (proxy_user, target_schema).
# [profiles.proxy_auth]
# proxy_user = "MCP_PROXY"
# target_schema = "APP_OWNER"
# [[profiles.app_context]] driver-level application-context triples applied at logon (redacted from diagnostics).
# [[profiles.app_context]]
# namespace = "ORACLEMCP_CTX"
# key = "tenant_id"
# value = "tenant-123"

