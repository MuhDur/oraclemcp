[package]
name = "oraclemcp"
version = "0.3.0"
description = "Engine-free, governed least-privilege Oracle Database MCP server with a fail-closed SQL guard and confirmation-gated operating levels (independent open-source project)."
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[[bin]]
name = "oraclemcp"
path = "src/main.rs"

[dependencies]
oraclemcp-core = { path = "../oraclemcp-core", version = "0.3.0" }
oraclemcp-db = { path = "../oraclemcp-db", version = "0.3.0" }
oraclemcp-config = { path = "../oraclemcp-config", version = "0.3.0" }
oraclemcp-guard = { path = "../oraclemcp-guard", version = "0.3.0" }
oraclemcp-auth = { path = "../oraclemcp-auth", version = "0.3.0" }
oraclemcp-audit = { path = "../oraclemcp-audit", version = "0.3.0" }
oraclemcp-error = { path = "../oraclemcp-error", version = "0.3.0" }
oraclemcp-telemetry = { path = "../oraclemcp-telemetry", version = "0.3.0" }
asupersync.workspace = true
async-trait.workspace = true
clap = { version = "4", features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
getrandom = "0.2"
tracing.workspace = true
tracing-subscriber = "0.3"

[dev-dependencies]
rcgen = "0.13"

[lints]
workspace = true
