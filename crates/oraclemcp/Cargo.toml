[package]
name = "oraclemcp"
version = "0.1.0"
description = "Engine-free, read-only Oracle Database MCP server with a fail-closed SQL guard (independent open-source project)."
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []
# Pulls in the Oracle driver (ODPI-C / Instant Client) via oraclemcp-db so the
# live-DB tools can actually connect. Off = pure offline build with no native
# deps: RustOracleConnection::connect returns BackendNotCompiled and live tool
# calls return a structured RuntimeStateRequired envelope rather than panicking.
live-db = ["oraclemcp-db/oracle-driver"]

[[bin]]
name = "oraclemcp"
path = "src/main.rs"

[dependencies]
oraclemcp-core = { path = "../oraclemcp-core", version = "0.1.0" }
oraclemcp-db = { path = "../oraclemcp-db", version = "0.1.0" }
oraclemcp-config = { path = "../oraclemcp-config", version = "0.1.0" }
oraclemcp-guard = { path = "../oraclemcp-guard", version = "0.1.0" }
oraclemcp-auth = { path = "../oraclemcp-auth", version = "0.1.0" }
oraclemcp-error = { path = "../oraclemcp-error", version = "0.1.0" }
clap = { version = "4", features = ["derive"] }
serde.workspace = true
serde_json.workspace = true
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std", "sync", "time", "net", "signal"] }
tracing.workspace = true
tracing-subscriber = "0.3"

[dev-dependencies]
rmcp = { version = "1.7", features = ["server", "transport-io"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "io-util"] }

[lints]
workspace = true
